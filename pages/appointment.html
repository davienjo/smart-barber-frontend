<section class="appointment-form" id= "appointment">

<form id = "book-appointment-form">
<!-- NAME -->
  <label for="name">Your Name</label>
  <input type="text" placeholder="Enter your name" id="name" name="name" required>
<!-- EMAIL -->
  <label for="email">Your Email</label>
  <input type="email" placeholder="Enter your email" id="email" name="email" required>

<!-- TIME -->
<label for="time">Select Time</label>
<input type="time" name="time" id="time" placeholder="time" required>
<!-- DATE -->
 <label for="date">Select date</label>
 <input type="date" id="date" name="date" required>

<!-- SERVICE -->
<label for="services">Services</label>
<select id="services" name="services">

<option value="">-- Select Service --</option>
<option value="Hair-cut">Hair-cut</option>  
<option value="Beard Trim">Beard Trim</option>  
<option value="Shave">Shave</option>  
<option value="Hair + Beard combo">Hair + Beard combo</option>  
<option value="Kids' Haircut">Kids' Haircut</option>  
</select>


<!-- BARBER -->
<label for="barber">Choose Barber(optional)</label>
<select id="barber" name="barber">

<option value ="">Any barber</option>
<option value ="Martin Lawrence">Martin Lawrence</option>
<option value="John Smith">John Smith</option>
<option value="James Brown">James Brown</option>
<option value="Kelvin Squidward">Kelvin Squidward</option>
</select>

<button type="submit" class="appointment-btn">Book Appointment</button>

</form>


</section>
